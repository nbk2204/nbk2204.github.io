<script>
  // PASTE YOUR COPIED GOOGLE WEB APP DEPLOYMENT URL HERE:
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzO2pELuX5B6l68co-Kxy0nsbMyH962WWLySyecwNfKIlrsLgaFvraABXh-_j80t0nEwA/exec";
  
  let html5QrCode;

  function requestPermissionAndStart() {
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("reader").innerHTML = "Opening Rear Camera...";
    
    // Create the scanner instance if it doesn't exist
    if (!html5QrCode) {
      html5QrCode = new Html5Qrcode("reader");
    }
    
    // Force the browser to natively invoke the standard rear camera directly
    html5QrCode.start(
      { facingMode: "environment" }, // Standard mobile back-facing camera profile
      {
        fps: 15,
        qrbox: { width: 250, height: 250 }
      },
      (decodedText) => {
        // Stop scanning upon reading a QR code, then process logs
        html5QrCode.stop().then(() => {
          processAttendance(decodedText);
        }).catch(err => {
          processAttendance(decodedText); // Process anyway if stop errors out
        });
      },
      (errorMessage) => {
        // Tracking frames silently...
      }
    ).catch(err => {
      document.getElementById("reader").innerHTML = "❌ Camera Blocked. Check your browser site permissions.";
      document.getElementById("startBtn").style.display = "block";
      console.error(err);
    });
  }

  function processAttendance(decodedText) {
    const logType = document.getElementById("logType").value;
    const resultDiv = document.getElementById("result");
    
    resultDiv.style.display = "block";
    resultDiv.className = "";
    resultDiv.innerHTML = "Sending scan data to Google Sheets...";

    fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ employeeId: decodedText, logType: logType })
    })
    .then(() => {
      resultDiv.className = "success";
      resultDiv.innerHTML = `✅ ${logType} Sent Successfully!<br>ID: ${decodedText}`;
      setTimeout(() => { 
        resultDiv.style.display = "none"; 
        requestPermissionAndStart(); 
      }, 3000);
    })
    .catch(error => {
      resultDiv.className = "error";
      resultDiv.innerHTML = "❌ Network error updating logs.";
      setTimeout(() => { requestPermissionAndStart(); }, 3000);
    });
  }
</script>
